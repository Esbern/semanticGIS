"""
A custom version of the CPR entity 'Navn'
Grunddatamodel info:
name: Navn
alternativtNavn: #NOTES#Description: Andre navne, som datatypenkan haveSKOS ækvivalent:skos:altLabel
comment (da): <memo>#NOTES#Navneoplysninger: Fornavn, mellemnavn og efternavn, eget efternavn, dvs. personens seneste efternavn erhvervet på andet grundlag end ægteskab, markering af manglende mulighed for korrekt registrering af navn, jf. § 5, stk. 3, samt adresseringsnavn, jf. § 5, stk. 4-7. Tidligere navne opbevares i CPR (historisk). Navn er ”null” for unavngivne Personer. Et barn, der fødes i Danmark (nyfødte), registreres ved personnummertildelingen som unavngivet.Bekendtgørelse af lov om Det Centrale Personregister §5.
definition: Informationer om en persons navne - fornavne, mellemnavne, efternavn og slægtsnavn. Herudover adresseringsnavn, som kun registreres på den nuværende forekomst. Navn er null for nyfødte.#NOTES#Description: Datatypens definition. Kort tekst, som entydigt beskriver datatypen - kan også indeholde et afsnit med en længere beskrivelse, fx formål, referencer og kilde.SKOS ækvivalent:skos:definition    Krav:Krævet
definition (da): <memo>#NOTES#Informationer om en persons navne - fornavne, mellemnavne, efternavn og slægtsnavn. Herudover adresseringsnavn, som kun registreres på den nuværende forekomst. Navn er null for nyfødte.
eksempel: <memo>#NOTES#Default: <memo>Description: Eksempler på anvendelse af datatypen
historikmodel: #NOTES#Values: registreringshistorik,bitemporalitet
legalSource: https://www.retsinformation.dk/eli/lta/2020/1297
lovgrundlag: Bekendtgørelse af lov om Det Centrale Personregister §5.#NOTES#Description: Angivelse af det lovgrundlag, som hjemler indsamlingen af data for datatypenSKOS ækvivalent:- (mangler)
note: <memo>#NOTES#Default: <memo>Description: Uddybende beskrivelse af datatypenSKOS ækvivalent:skos:note
prefLabel (da): Navn
URI: https://data.gov.dk/model/profile/person/navn/Navn
EAID: EAID_20C79015_D907_485a_98A4_0517A9899FC2
"""
type CPRCustom_PublicSectorNavn {
  """
  Grunddatamodel info:
  type: CharacterString
  multiplicity: 0..1
  URI: https://data.gov.dk/model/profile/person/navn/Navn/adresseringsnavn
  prefLabel (da): adresseringsnavn
  definition (da): Adresseringsnavn er på formen fornavne (inkl. evt. mellemnavn), efternavn. Adresseringsnavn kan anvendes af offentlige myndigheder til forsendelse, og det vil normalt være det navn, som fremgår af sundhedskortet, dog hvor efternavn skrives sidst og uden brug af komma separation. Om adresseringsnavn gælder i øvrigt at Hvis en persons navn i CPR efter stk. 1 og 2 er for langt til brug ved maskinel udskrivning (adressering), sørger Økonomi- og Indenrigsministeriet for, at der i CPR dannes et adresseringsnavn for vedkommende. Dette navn skal, hvis det er teknisk muligt, indeholde hele efternavnet og mindst ét helt fornavn registreret efter stk. 1.Forkortelser efter foretages ved, at fornavn eller mellemnavn i nødvendigt omfang forkortes til 1. bogstav. Eventuelle forkortelser foretages i sidste fornavn eller mellemnavn før efternavnet, dernæst i næstsidste og så fremdeles. Hvis første bogstav i første fornavn sammen med efternavnet overstiger det teknisk mulige for adressering, foretages forkortelserne tillige i efternavnet.Er den maskinelle forkortelse utilfredsstillende, registreres det bedst mulige adresseringsnavn, der så vidt muligt altid skal indeholde personens efternavn og mindst ét fornavn skrevet fuldt ud.Enhver har ret til ved henvendelse i sin bopælskommune at få registreret et adresseringsnavn på grundlag af det fulde navn, herunder at få ændret et adresseringsnavn. Adresseringsnavnet skal altid indeholde vedkommendes efternavn og mindst ét af vedkommendes fornavne skrevet fuldt ud.
  legalSource: https://www.retsinformation.dk/eli/lta/2020/1297
  """
  adresseringsnavn: String @cost(weight: "1")
  """
  Grunddatamodel info:
  type: CharacterString
  multiplicity: 0..1
  URI: https://data.gov.dk/model/profile/person/navn/Navn/efternavn
  prefLabel (da): efternavn
  definition (da): Personens efternavn.
  legalSource: https://www.retsinformation.dk/eli/lta/2020/1297
  """
  efternavn: String! @cost(weight: "1")
  """
  Grunddatamodel info:
  type: CharacterString
  multiplicity: 0..1
  URI: https://data.gov.dk/model/profile/person/navn/Navn/fornavne
  prefLabel (da): fornavne
  definition (da): Persons fornavne.
  legalSource: https://www.retsinformation.dk/eli/lta/2020/1297
  """
  fornavne: String! @cost(weight: "1")
  """
  Grunddatamodel info:
  type: CharacterString
  multiplicity: 0..1
  URI: https://data.gov.dk/model/profile/person/navn/Navn/mellemnavn
  prefLabel (da): mellemnavn
  definition (da): Personens mellemnavne.
  legalSource: https://www.retsinformation.dk/eli/lta/2020/1297
  """
  mellemnavn: String @cost(weight: "1")
  efternavnmarkering: String @cost(weight: "1")
  fornavnemarkering: String @cost(weight: "1")
  mellemnavnmarkering: String @cost(weight: "1")
  """
  Grunddatamodel info:
  type: Status
  multiplicity: 1
  URI: https://data.gov.dk/model/profile/person/navn/Navn/status
  prefLabel (da): status
  definition (da): Angiver status på navnet.
  legalSource: https://www.retsinformation.dk/eli/lta/2020/1297
  """
  status: String! @cost(weight: "1")
  virkningfra: LocalDate @cost(weight: "1")
  virkningfrausikkerhedsmarkering: Boolean @cost(weight: "1")
  virkningtil: LocalDate @cost(weight: "1")
  virkningtilusikkerhedsmarkering: Boolean @cost(weight: "1")
}

